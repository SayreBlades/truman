name: Publish Container Images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  GATEWAY_IMAGE: ghcr.io/sayreblades/truman-gateway
  AGENT_IMAGE: ghcr.io/sayreblades/truman-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            echo "gateway_tags=${{ env.GATEWAY_IMAGE }}:${VERSION},${{ env.GATEWAY_IMAGE }}:latest" >> $GITHUB_OUTPUT
            echo "agent_tags=${{ env.AGENT_IMAGE }}:${VERSION},${{ env.AGENT_IMAGE }}:latest" >> $GITHUB_OUTPUT
          else
            echo "gateway_tags=${{ env.GATEWAY_IMAGE }}:latest" >> $GITHUB_OUTPUT
            echo "agent_tags=${{ env.AGENT_IMAGE }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: images/gateway
          push: true
          tags: ${{ steps.tags.outputs.gateway_tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push agent
        uses: docker/build-push-action@v5
        with:
          context: images/agent
          push: true
          tags: ${{ steps.tags.outputs.agent_tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
